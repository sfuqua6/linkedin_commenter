<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Settings — Comment Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0e0e10;
      --surface:     #151517;
      --border:      rgba(255,255,255,0.07);
      --text:        #cdc8be;
      --text-dim:    rgba(255,255,255,0.38);
      --text-faint:  rgba(255,255,255,0.18);
      --accent:      #c9804d;
      --accent-soft: rgba(201,128,77,0.12);
      --serif:       'Instrument Serif', Georgia, serif;
      --mono:        'IBM Plex Mono', 'SF Mono', Menlo, monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 44px 28px 72px;
    }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 52px;
    }

    .diamond {
      width: 9px;
      height: 9px;
      background: var(--accent);
      border-radius: 2px;
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    .nav-name {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .back-link {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-faint);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }

    /* ── Heading ── */
    h1 {
      font-family: var(--serif);
      font-weight: 400;
      font-size: 38px;
      line-height: 1.08;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-faint);
      margin-bottom: 14px;
    }

    /* ── Cards ── */
    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px 22px 18px;
      background: var(--surface);
      margin-bottom: 12px;
    }

    /* ── Form elements ── */
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
      margin-top: 18px;
      letter-spacing: 0.02em;
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"],
    textarea,
    select {
      width: 100%;
      padding: 8px 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    input::placeholder,
    textarea::placeholder { color: var(--text-faint); }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }

    select option { background: var(--surface); }

    textarea {
      resize: vertical;
      min-height: 88px;
      line-height: 1.55;
    }

    .hint {
      font-size: 10px;
      color: var(--text-faint);
      margin-top: 5px;
      line-height: 1.5;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── Save button ── */
    .btn-save {
      padding: 10px 24px;
      background: var(--accent);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.12s;
      margin-top: 28px;
    }
    .btn-save:hover { opacity: 0.85; }

    #status {
      display: inline-block;
      margin-left: 14px;
      font-size: 11px;
      color: var(--accent);
      vertical-align: middle;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
<div class="page">

  <nav class="nav">
    <div class="diamond"></div>
    <span class="nav-name">Comment Engine</span>
    <a class="back-link" href="#" onclick="window.close(); return false;">← close</a>
  </nav>

  <h1>Settings</h1>
  <p class="subtitle">Set your voice. Syncs across devices via Chrome.</p>

  <!-- Voice & Persona -->
  <div class="section-label">Voice &amp; Persona</div>
  <div class="card">
    <label for="systemPrompt">System prompt</label>
    <textarea id="systemPrompt" rows="4"
      placeholder="e.g. You write sharp, direct LinkedIn comments. No hashtags or em dashes."></textarea>
    <p class="hint">Overrides the built-in prompt. Leave blank to use the default.</p>

    <label for="role">Your role</label>
    <input type="text" id="role" placeholder="e.g. Startup founder, ML engineer, B2B marketer">
    <p class="hint">Added to every prompt so comments sound like you.</p>

    <label for="topics">Your topics</label>
    <input type="text" id="topics" placeholder="e.g. AI, SaaS growth, product-led growth">
    <p class="hint">Keeps comments within your areas of expertise.</p>
  </div>

  <!-- Output -->
  <div class="section-label">Output</div>
  <div class="card">
    <div class="row-2">
      <div>
        <label for="length">Length</label>
        <select id="length">
          <option value="short">Short — 1–2 sentences</option>
          <option value="medium" selected>Medium — 2–4 sentences</option>
          <option value="long">Long — 4–6 sentences</option>
        </select>
      </div>
      <div>
        <label for="draftCount">Drafts per request</label>
        <select id="draftCount">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn-save" id="save">Save settings</button>
  <span id="status"></span>

</div>

<script src="options.js"></script>
</body>
</html>
